<!doctype html>
<html lang="en">
  <head>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#222831" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Staple</title>
    <!-- Tema flash'ını önle: React yüklenmeden data-theme'i uygula (accent'i ThemeContext ayarlar) -->
    <script>
      (function () {
        try {
          var d = document.documentElement;
          var mm = window.matchMedia;
          // Tema (Otomatik → OS'a göre Karanlık/Açık)
          var t = localStorage.getItem("staple-theme") || "ocean";
          var eff = t;
          if (t === "auto") {
            eff = mm && mm("(prefers-color-scheme: dark)").matches ? "black" : "light";
          } else if (!/^(ocean|black|light)$/.test(t)) {
            eff = "ocean";
          }
          d.setAttribute("data-theme", eff);
          // Hareketi azalt (kayıt yoksa OS tercihinden)
          var rm = localStorage.getItem("staple-reduce-motion");
          if (rm === null) rm = mm && mm("(prefers-reduced-motion: reduce)").matches ? "1" : "0";
          d.setAttribute("data-reduce-motion", rm === "1" ? "1" : "0");
          // Tile boyutu
          var ts = localStorage.getItem("staple-tile-size") || "medium";
          d.style.setProperty("--tile-size", ts === "small" ? "140px" : ts === "large" ? "280px" : "200px");
        } catch (e) {}
      })();
    </script>
  </head>
  <body bgcolor="#393E46">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
